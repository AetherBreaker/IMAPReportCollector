[project]
  dependencies = [
    "aiologic==0.16.*",
    "heartrate>=0.2.2",
    "imap-tools>=1.11.1",
    "paramiko>=5.0.0",
    "pydantic-settings==2.*",
    "pydantic==2.*",
    "rich>=15.0.0",
    "sft-ext[sftp]==0.7.3",
    "tzdata>=2026.1",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
  ]
  name = "imapreportcollector"
  requires-python = ">=3.14"
  version = "0.1.2"

[tool.uv]
  environments = [
    "sys_platform == 'linux'",
    "sys_platform == 'win32'",
  ]

  [tool.uv.sources]
    sft-ext = [
      { git = "https://github.com/AetherBreaker/sft_ext", marker = "sys_platform == 'linux'", tag = "v0.7.3" },
      { path = "D:\\SFT Software Projects\\sft_ext", editable = true, marker = "sys_platform == 'win32'" },
    ]

[tool.ruff]
  extend = "../pyproject.toml"

  src = [
    "./src",
  ]

[tool.pyright]
  extraPaths = [
    "src",
  ]
  typeCheckingMode = "standard"

  executionEnvironments = [
    { root = "src", extraPaths = [
      "src",
    ] },
  ]
