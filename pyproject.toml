[project]
name = "imapreportcollector"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "aiologic==0.16.*",
    "heartrate>=0.2.2",
    "imap-tools>=1.11.1",
    "paramiko>=5.0.0",
    "pydantic==2.*",
    "pydantic-settings==2.*",
    "rich>=15.0.0",
    "sft-ext[sftp]==0.2.2",
    "tzdata>=2026.1",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
]

[tool.uv]
environments = [
    "sys_platform == 'win32'",
    "sys_platform == 'linux'",
]

[tool.uv.sources]
sft-ext = [
    { path = "D:\\SFT Software Projects\\sft_ext", editable = true , marker = "sys_platform == 'win32'" },
    { git = "https://github.com/AetherBreaker/sft_ext", marker = "sys_platform == 'linux'" , tag = "v0.2.2" },
]


