[project]
  name            = "imapreportcollector"
  version         = "0.2.3"
  requires-python = ">=3.14"
  dependencies    = [
    "aiologic==0.16.*",
    "heartrate>=0.2.2",
    "imap-tools>=1.11.1",
    "paramiko>=5.0.0",
    "pydantic==2.*",
    "pydantic-settings==2.*",
    "rich>=15.0.0",
    "sft-ext[sftp]==1.3.1",
    "tzdata>=2026.1",
    "uvloop>=0.22.1 ; sys_platform == 'linux'",
    "winloop>=0.6.0 ; sys_platform == 'win32'",
  ]

[tool.poe.tasks.bump]
  help        = "Bump version, commit, tag, and push. Usage: poe bump [major|minor|patch]"
  interpreter = "bash"
  shell       = """
    set -e
    NEW_VERSION=$(uv version --bump "${bump_type}" | awk '{print $NF}')
    git add pyproject.toml uv.lock
    git commit -m "Bump version to ${NEW_VERSION}"
    git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
    git push --follow-tags
  """

  [[tool.poe.tasks.bump.args]]
    name       = "bump_type"
    positional = true
    help       = "Version component to bump: major, minor, or patch"

[tool.pyright]
  extraPaths       = ["src"]
  typeCheckingMode = "standard"

  executionEnvironments = [{ root = "src", extraPaths = ["src"] }]

[tool.ruff]
  extend = "../pyproject.toml"

  src = ["./src"]

[tool.uv]
  [tool.uv.sources]
    sft-ext = [
      { git = "https://github.com/AetherBreaker/sft_ext", tag = "v1.3.1" },
    ]
